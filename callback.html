<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Callback Mercado Livre</title>
</head>
<body>
  <h2>Callback Mercado Livre</h2>

  <pre id="code"></pre>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    document.getElementById("code").innerText =
      code ? "Código recebido:\n" + code : "Nenhum código recebido";
  </script>
</body>
</html>
